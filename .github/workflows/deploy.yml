name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      # Aspire reads these to skip interactive prompts in CI.
      AzureSubscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AzureLocation: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      Azure__ResourceGroup: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-kaylas-garden' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Aspire deploy
        run: aspire deploy --non-interactive --include-exception-details
